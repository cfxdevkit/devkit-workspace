<svg width="1024" height="1024" viewBox="0 0 1024 1024" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Node Orbit — Conflux DevKit mark -->
  <defs>
    <linearGradient id="hexFill" x1="330" y1="286" x2="694" y2="706" gradientUnits="userSpaceOnUse">
      <stop stop-color="#00D4FF" stop-opacity="0.08"/>
      <stop offset="1" stop-color="#0D1117" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="hexStroke" x1="512" y1="286" x2="512" y2="706" gradientUnits="userSpaceOnUse">
      <stop stop-color="#4DE8FF"/>
      <stop offset="1" stop-color="#0098BB"/>
    </linearGradient>
    <linearGradient id="accentDot" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#FFA44D"/>
      <stop offset="1" stop-color="#FF6B00"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.48" r="0.4">
      <stop stop-color="#00D4FF" stop-opacity="0.10"/>
      <stop offset="1" stop-color="#00D4FF" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1024" height="1024" rx="224" fill="#0D1117"/>
  <rect width="1024" height="1024" rx="224" fill="url(#glow)"/>

  <!-- Orbital arcs -->
  <path d="M512 216 A280 280 0 0 1 792 496"
        stroke="#00D4FF" stroke-width="2.5" stroke-opacity="0.22" fill="none"
        stroke-linecap="round"/>
  <path d="M512 776 A280 280 0 0 1 232 496"
        stroke="#00D4FF" stroke-width="2.5" stroke-opacity="0.16" fill="none"
        stroke-linecap="round"/>

  <!-- Hexagon — pointy-top, R=210, center (512,496) -->
  <path d="M512 286L694 391V601L512 706L330 601V391Z"
        fill="url(#hexFill)"
        stroke="url(#hexStroke)" stroke-width="12" stroke-linejoin="round"/>

  <!-- > chevron — white -->
  <path d="M400 440L480 496L400 552"
        stroke="#FFFFFF" stroke-width="26" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- _ cursor — cyan -->
  <path d="M506 552H624"
        stroke="#00D4FF" stroke-width="26" stroke-linecap="round"/>

  <!-- Vertex node dots -->
  <circle cx="512" cy="286" r="7" fill="#00D4FF" opacity="0.55"/>
  <circle cx="694" cy="601" r="6" fill="#00D4FF" opacity="0.35"/>
  <circle cx="330" cy="391" r="6" fill="#00D4FF" opacity="0.40"/>

  <!-- Orange accent dot -->
  <circle cx="714" cy="380" r="12" fill="url(#accentDot)"/>
</svg>
