# CFX DevKit — Project Stack
#
# Containerized dApp: builds and serves the project on :3030.
#
# Usage:
#   pnpm stack:up     — start the container
#   pnpm stack:down   — stop it
#   pnpm stack:logs   — follow logs
#
# Prerequisites:
#   1. Start the Conflux devkit server: "Conflux: Start DevKit Server"
#   2. Start the node: "Conflux: Start Node"
#   3. Then start this stack: pnpm stack:up
#
# The service uses host networking so code-server (also on host networking)
# can reach it on localhost via /proxy/<port>/ and direct browser access.
#   - dApp: http://localhost:3030

services:
  dapp:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        CONTRACT_ADDRESSES_FILE: ${CONTRACT_ADDRESSES_FILE:-}
        EXAMPLE_COUNTER_ADDRESS: ${EXAMPLE_COUNTER_ADDRESS:-}
        EXAMPLE_COUNTER_CHAIN_ID: ${EXAMPLE_COUNTER_CHAIN_ID:-2030}
    container_name: cfxdevkit-dapp
    network_mode: host
    environment:
      NODE_ENV: production
      PORT: "3030"
      DEVKIT_URL: "http://127.0.0.1:7748"
      ESPACE_RPC_URL: "http://127.0.0.1:8545"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3030/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    labels:
      com.cfxdevkit.service: "dapp"
      com.cfxdevkit.description: "Reference dApp with auth, faucet, and example contract integration"
