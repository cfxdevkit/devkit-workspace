name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      release_tag:
        description: Version tag to publish, for example v0.1.0
        required: true
        type: string

permissions:
  contents: read
  packages: write
  id-token: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: Publish Docker Image
    runs-on: ubuntu-latest
    env:
      RELEASE_TAG: ${{ github.event.inputs.release_tag || github.ref_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.14.0
          cache: pnpm
          registry-url: https://registry.npmjs.org/

      - name: Setup npm for trusted publishing
        run: npm install -g npm@^11.5.1

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify release version alignment
        run: |
          node -e "const fs=require('fs'); const tag=(process.env.RELEASE_TAG||'').replace(/^v/,''); const root=JSON.parse(fs.readFileSync('package.json','utf8')).version; const cli=JSON.parse(fs.readFileSync('packages/workspace-cli/package.json','utf8')).version; if (!tag) { console.error('RELEASE_TAG is empty'); process.exit(1); } if (root !== cli) { console.error('Root package.json version and packages/workspace-cli/package.json version must match.'); process.exit(1); } if (tag !== cli) { console.error('Git tag version must match packages/workspace-cli/package.json.'); process.exit(1); } console.log('Publishing version', cli);"

      - name: Build CLI package
        run: pnpm --filter conflux-workspace build

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/cfxdevkit/devkit-workspace-web
          tags: |
            type=semver,pattern={{version}},value=${{ github.ref_name }}
            type=semver,pattern={{major}}.{{minor}},value=${{ github.ref_name }}
            type=semver,pattern={{major}},value=${{ github.ref_name }}
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max